name: Bug report
description: Report a defect in chromatic
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproducer (code, command, sample image dimensions — **not** the image itself if it contains a face).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: chromatic version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04 / macOS 14 / Windows 11"
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I confirm this report contains **no** images of real people, no PII, and no production data.
          required: true
