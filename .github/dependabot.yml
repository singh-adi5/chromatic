version: 2
updates:

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      runtime:
        applies-to: version-updates
        patterns: ["*"]
        exclude-patterns: ["pytest*", "ruff", "mypy", "bandit*", "pip-audit"]
      dev:
        applies-to: version-updates
        patterns: ["pytest*", "ruff", "mypy", "bandit*", "pip-audit"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
