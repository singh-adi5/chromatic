name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum-privilege token: read-only on contents.
permissions:
  contents: read

jobs:

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff (lint)
        run: ruff check src tests demo

      - name: Ruff (format check)
        run: ruff format --check src tests demo

      - name: Mypy (strict types on the core package)
        run: mypy --config-file pyproject.toml src/chromatic
        continue-on-error: true   # tighten to required once mypy is clean

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libs for OpenCV / MediaPipe
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download MediaPipe model
        run: bash scripts/download_models.sh

      - name: Run tests
        env:
          CHROMATIC_FACE_MODEL_PATH: ${{ github.workspace }}/models/face_landmarker.task
        run: pytest -v --cov-report=xml --cov-report=term

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
