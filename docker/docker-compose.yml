# docker-compose.yml — local development & integration testing
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# The `api` service runs the hardened production image (see Dockerfile).
# The `dev` service is a thin overlay that mounts the source tree for hot-reload.

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: chromatic:local
    container_name: chromatic-api
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8080:8080"      # bind to loopback by default
    environment:
      CHROMATIC_LOG_LEVEL: "INFO"
      CHROMATIC_DECISION_THRESHOLD: "0.65"
      CHROMATIC_RATE_LIMIT_PER_MIN: "60"
      # Generate with `openssl rand -hex 32` and inject via secret manager in prod.
      CHROMATIC_JWT_SECRET: "${CHROMATIC_JWT_SECRET:-change-me-in-production}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: developer overlay with source mount and reload.
  # Activate with: docker compose --profile dev up
  dev:
    extends: api
    profiles: ["dev"]
    container_name: chromatic-dev
    read_only: false
    volumes:
      - ../src:/opt/venv/lib/python3.12/site-packages/chromatic_src:ro
    command:
      - "uvicorn"
      - "chromatic.api.server:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--reload"
